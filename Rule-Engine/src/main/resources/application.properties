spring.application.name=ae-rule-engine

# H2 File-Based DB for dev (swap to PostgreSQL for prod)
spring.datasource.url=jdbc:h2:./data/ruleenginedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT
app.jwt.secret=adf-rule-engine-secret-key-2024-super-secure-256bit-key-for-jwt
app.jwt.expiration=86400000

# Server
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.min-response-size=1024

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Vite proxy path
spring.mvc.pathmatch.use-suffix-pattern=false

# Startup optimization
spring.devtools.restart.enabled=false
spring.jmx.enabled=false
spring.main.lazy-initialization=false

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fintelligence40@gmail.com
