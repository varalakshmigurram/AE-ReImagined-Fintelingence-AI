spring.application.name=ae-rule-engine

# H2 File-Based DB for dev (swap to PostgreSQL for prod)
spring.datasource.url=jdbc:h2:./data/ruleenginedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT
app.jwt.secret=adf-rule-engine-secret-key-2024-super-secure-256bit-key-for-jwt
app.jwt.expiration=86400000

# Server
server.port=8080

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Vite proxy path
spring.mvc.pathmatch.use-suffix-pattern=false

